# يبني مثبّت ويندوز (نسخة تثبيت + نسخة محمولة للفلاشة) وينشرهما في صفحة Releases
name: Build Windows Installer
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      # الأهداف والمعماريات تُقرأ من build.win في package.json:
      # مثبّت nsis عالمي (x64 + ia32 في ملف واحد) + نسخة محمولة x64
      - run: npx electron-builder --win --publish never
      - name: List artifacts
        run: dir dist
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          # latest.yml + blockmap مطلوبان للتحديث التلقائي (electron-updater يقرؤهما من الإصدار)
          files: |
            dist/*.exe
            dist/latest.yml
            dist/*.blockmap
          fail_on_unmatched_files: false
      - uses: actions/upload-artifact@v4
        with:
          name: sened-windows
          path: dist/*.exe
      # نشر النسخ في فرع dist داخل المستودع (لتحميلها عبر git أيضاً)
      - name: Publish builds to dist branch
        shell: bash
        run: |
          mkdir -p /tmp/distpub && cp dist/*.exe /tmp/distpub/
          cd /tmp/distpub
          git init -b dist
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Windows builds ${GITHUB_REF_NAME:-manual}"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" dist
