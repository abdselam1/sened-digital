<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>سند — نظام الإدارة والمحاسبة الذكي</title>
  <link rel="icon" href="../assets/icon-64.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- شاشة التحميل -->
  <div class="preloader" id="preloader">
    <img class="pre-logo" src="../assets/logo.png" alt="سند">
    <div class="pre-text" id="pre-text">سند</div>
    <div class="pre-bar"><div class="pre-fill"></div></div>
  </div>

  <canvas id="particles-canvas"></canvas>

  <!-- شاشة الدخول -->
  <div class="auth-screen" id="loginScreen">
    <div class="auth-card">
      <img class="auth-logo" src="../assets/logo.png" alt="سند">
      <h2 data-i18n="login"></h2>
      <p class="muted" id="loginSubtitle" data-i18n="tagline"></p>
      <div class="demo-hint" id="demoHint">
        <span data-i18n="demoHint"></span>
        <div class="demo-creds" dir="ltr"><code>admin</code> / <code>admin123</code></div>
      </div>
      <div class="field"><label data-i18n="username"></label><input id="loginUser" autocomplete="username"></div>
      <div class="field"><label data-i18n="password"></label><input id="loginPass" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="auth-error" id="loginError"></div>
      <button class="btn btn-gold" style="width:100%;justify-content:center" onclick="doLogin()" data-i18n="loginBtn"></button>
    </div>
  </div>

  <!-- شاشة القفل -->
  <div class="auth-screen" id="lockScreen">
    <div class="auth-card">
      <img class="auth-logo" src="../assets/logo.png" alt="سند">
      <h2 data-i18n="lock"></h2>
      <div class="field"><label data-i18n="password"></label><input id="lockPass" type="password" onkeydown="if(event.key==='Enter')doUnlock()"></div>
      <div class="auth-error" id="lockError"></div>
      <button class="btn btn-gold" style="width:100%;justify-content:center" onclick="doUnlock()" data-i18n="loginBtn"></button>
    </div>
  </div>

  <!-- شاشة تفعيل المطوّر (كود مرة واحدة لكل جهاز) -->
  <div class="auth-screen" id="activationScreen">
    <div class="auth-card">
      <img class="auth-logo" src="../assets/logo.png" alt="سند">
      <h2 data-i18n="activationTitle"></h2>
      <p class="muted" data-i18n="activationBody"></p>
      <div class="field" style="margin-top:14px"><label data-i18n="activationCodeLabel"></label><input id="activationCodeInput" type="password" onkeydown="if(event.key==='Enter')doActivate()"></div>
      <div class="auth-error" id="activationError"></div>
      <button class="btn btn-gold" style="width:100%;justify-content:center" onclick="doActivate()" data-i18n="activate"></button>
    </div>
  </div>

  <!-- شاشة قفل الترخيص عن بُعد -->
  <div class="auth-screen" id="licenseLockScreen">
    <div class="auth-card">
      <img class="auth-logo" src="../assets/logo.png" alt="سند">
      <h2 data-i18n="lockedTitle"></h2>
      <p class="muted" id="licenseLockMsg" data-i18n="lockedBody"></p>
      <button class="btn btn-gold" style="width:100%;justify-content:center;margin-top:16px" onclick="exportData()" data-i18n="exportMyData"></button>
    </div>
  </div>

  <div class="app hidden" id="appShell">
    <!-- الشريط الجانبي -->
    <aside class="sidebar">
      <div class="brand">
        <img class="brand-logo" src="../assets/logo.png" alt="سند">
        <div>
          <div class="brand-name" id="brandName">سند</div>
          <div class="brand-tag" data-i18n="tagline"></div>
        </div>
      </div>
      <div class="lang-switch" id="langSwitch">
        <button data-lang="ar" onclick="switchLanguage('ar')">AR</button>
        <button data-lang="fr" onclick="switchLanguage('fr')">FR</button>
        <button data-lang="en" onclick="switchLanguage('en')">EN</button>
      </div>
      <nav class="nav-scroll">
        <div class="nav-item active" data-page="dashboard"><span class="ic">◈</span><span data-i18n="dashboard"></span></div>
        <div class="nav-item" data-page="invoices"><span class="ic">▤</span><span data-i18n="invoices"></span></div>
        <div class="nav-item" data-page="quotations"><span class="ic">◧</span><span data-i18n="quotation"></span></div>
        <div class="nav-item" data-page="purchases"><span class="ic">⇩</span><span data-i18n="purchases"></span></div>
        <div class="nav-item" data-page="products"><span class="ic">▣</span><span data-i18n="products"></span></div>
        <div class="nav-item" data-page="customers"><span class="ic">◉</span><span data-i18n="customers"></span></div>
        <div class="nav-item" data-page="suppliers"><span class="ic">◎</span><span data-i18n="suppliers"></span></div>
        <div class="nav-item" data-page="debts"><span class="ic">⧖</span><span data-i18n="debts"></span></div>
        <div class="nav-item" data-page="employees"><span class="ic">◈</span><span data-i18n="employees"></span></div>
        <div class="nav-item" data-page="shareholders"><span class="ic">◇</span><span data-i18n="shareholders"></span></div>
        <div class="nav-item" data-page="wallets"><span class="ic">◆</span><span data-i18n="wallets"></span></div>
        <div class="nav-item" data-page="expenses"><span class="ic">▽</span><span data-i18n="expenses"></span></div>
        <div class="nav-item" data-page="reports"><span class="ic">◫</span><span data-i18n="reports"></span></div>
        <div class="nav-item" data-page="assistant"><span class="ic">✦</span><span data-i18n="assistant"></span></div>
        <div class="nav-item" data-page="telegram"><span class="ic">➤</span><span data-i18n="telegram"></span></div>
        <div class="nav-item" data-page="network"><span class="ic">⇌</span><span data-i18n="networkPage"></span></div>
        <div class="nav-item" data-page="settings"><span class="ic">⚙</span><span data-i18n="settings"></span></div>
        <div class="nav-item" data-page="admin"><span class="ic">⚡</span><span data-i18n="management"></span></div>
      </nav>
      <div class="sidebar-foot">
        <div class="muted" id="currentUserLabel" style="padding:2px 14px 4px"></div>
        <button class="foot-btn" onclick="openCmdk()"><span class="ic">⌕</span><span data-i18n="cmdkResults"></span><span class="muted" style="margin-inline-start:auto">Ctrl+K</span></button>
        <button class="foot-btn" onclick="openCalculator()"><span class="ic">▦</span><span data-i18n="calculator"></span></button>
        <button class="foot-btn" id="themeBtn" onclick="toggleTheme()"><span class="ic">☾</span><span id="themeLabel"></span></button>
        <button class="foot-btn" onclick="lockApp()"><span class="ic">🔒</span><span data-i18n="lock"></span></button>
        <button class="foot-btn" onclick="logoutApp()"><span class="ic">⏻</span><span data-i18n="logout"></span></button>
        <div class="ai-badge"><span class="dot" id="aiDot"></span><span id="aiStatus"></span></div>
        <!-- مؤشر حالة التزامن عبر الشبكة: يظهر فقط عند تفعيل وضع مضيف/متصل — النقر يفتح صفحة الاتصال بالشبكة -->
        <div class="ai-badge" id="syncBadge" style="display:none;cursor:pointer" onclick="goPage('network')"><span class="dot" id="syncDot"></span><span id="syncStatusText"></span></div>
      </div>
    </aside>

    <!-- المحتوى -->
    <main class="main">

      <!-- شريط تحذير الانقطاع (وضع العميل): ثابت أعلى المحتوى عند فقدان الاتصال بالخادم —
           النقطة الصغيرة في syncBadge لا تكفي لكاشير مشغول بالبيع. النقر يفتح صفحة الشبكة. -->
      <div id="offlineBar" class="offline-bar" onclick="goPage('network')">
        ⚠ <span data-i18n="offlineBarText"></span> — <u data-i18n="offlineBarAction"></u>
      </div>

      <!-- لوحة التحكم -->
      <section class="page active" id="page-dashboard">
        <div class="page-head"><h2 class="page-title" data-i18n="dashboard"></h2></div>
        <div id="onboardingBanner"></div>
        <div class="cards" id="dashCards"></div>
        <div class="panel">
          <h3 data-i18n="recentInvoices"></h3>
          <div class="tbl-wrap"><table id="dashInvTable"></table></div>
        </div>
      </section>

      <!-- المبيعات / الفواتير -->
      <section class="page" id="page-invoices">
        <!-- بطاقة الربط الأولى (للكاشير): تظهر إن كان الجهاز بلا إعداد شبكة (role=off)
             ولم يسبق تخطي الربط — يربط الكاشير جهازه بالخادم بلا مدير وبلا دخول للإعدادات.
             علم التخطي محلي لهذا الجهاز ولا يدخل البيانات المزامَنة. -->
        <div id="lanSetupCard" class="panel" style="display:none;border:1px solid var(--gold);margin-bottom:18px">
          <h3>⇌ <span data-i18n="lanSetupTitle"></span></h3>
          <p class="muted" data-i18n="lanSetupIntro" style="margin:6px 0 12px"></p>
          <button class="btn btn-gold" id="lanSetupDiscoverBtn" onclick="lanSetupDiscover()" style="width:100%" data-i18n="lanDiscoverBtn"></button>
          <div id="lanSetupDiscoveryList" style="margin-top:8px"></div>
          <div class="field" style="margin-top:10px">
            <label data-i18n="lanClientHint"></label>
            <input type="text" id="lanSetupHostIp" placeholder="192.168.1.10" style="direction:ltr;text-align:left">
          </div>
          <div class="field" style="margin-top:10px">
            <label data-i18n="lanPairCodeLabel"></label>
            <input type="text" id="lanSetupToken" data-i18n-ph="lanPairCodePh" style="direction:ltr;text-align:center;letter-spacing:4px" maxlength="20">
          </div>
          <p id="lanSetupStatus" style="margin:8px 0 0"></p>
          <div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap">
            <button class="btn btn-ghost" onclick="lanSetupTest()" data-i18n="lanTestBtn"></button>
            <button class="btn btn-gold" onclick="lanSetupSave()" data-i18n="lanSetupConnectBtn"></button>
            <button class="btn btn-ghost" onclick="lanSetupSkip()" style="margin-inline-start:auto" data-i18n="lanSetupSkipBtn"></button>
          </div>
        </div>
        <div class="page-head">
          <h2 class="page-title" data-i18n="invoices"></h2>
          <div style="display:flex;gap:8px">
            <button class="btn btn-ghost" onclick="openInvoiceAppearanceModal()" data-i18n="invoiceAppearance"></button>
            <button class="btn btn-ghost" onclick="exportInvoicesCsv()" data-i18n="exportCsv"></button>
            <button class="btn btn-gold" onclick="openInvoiceModal()">+ <span data-i18n="newInvoice"></span></button>
          </div>
        </div>
        <div class="tbl-wrap"><table id="invTable"></table></div>
      </section>

      <!-- عروض الأسعار -->
      <section class="page" id="page-quotations">
        <div class="page-head">
          <h2 class="page-title" data-i18n="quotation"></h2>
          <button class="btn btn-gold" onclick="openQuoteModal()">+ <span data-i18n="newQuotation"></span></button>
        </div>
        <div class="tbl-wrap"><table id="quoteTable"></table></div>
      </section>

      <!-- المشتريات -->
      <section class="page" id="page-purchases">
        <div class="page-head">
          <h2 class="page-title" data-i18n="purchases"></h2>
          <button class="btn btn-gold" onclick="openPurchaseModal()">+ <span data-i18n="newPurchase"></span></button>
        </div>
        <div class="tbl-wrap"><table id="purTable"></table></div>
      </section>

      <!-- المنتجات -->
      <section class="page" id="page-products">
        <div class="page-head">
          <h2 class="page-title" data-i18n="products"></h2>
          <div style="display:flex;gap:8px">
            <button class="btn btn-ghost" onclick="exportProductsCsv()" data-i18n="exportCsv"></button>
            <button class="btn btn-gold" onclick="openProductModal()">+ <span data-i18n="addProduct"></span></button>
          </div>
        </div>
        <div class="field"><input id="prodSearch" data-i18n-ph="search" oninput="renderProducts()"></div>
        <div class="tbl-wrap"><table id="prodTable"></table></div>
      </section>

      <!-- العملاء -->
      <section class="page" id="page-customers">
        <div class="page-head">
          <h2 class="page-title" data-i18n="customers"></h2>
          <button class="btn btn-gold" onclick="openCustomerModal()">+ <span data-i18n="addCustomer"></span></button>
        </div>
        <div class="field"><input id="custSearch" data-i18n-ph="search" oninput="renderCustomers()"></div>
        <div class="tbl-wrap"><table id="custTable"></table></div>
      </section>

      <!-- الموردون -->
      <section class="page" id="page-suppliers">
        <div class="page-head">
          <h2 class="page-title" data-i18n="suppliers"></h2>
          <button class="btn btn-gold" onclick="openSupplierModal()">+ <span data-i18n="addSupplier"></span></button>
        </div>
        <div class="tbl-wrap"><table id="supTable"></table></div>
      </section>

      <!-- الديون -->
      <section class="page" id="page-debts">
        <div class="page-head"><h2 class="page-title" data-i18n="debts"></h2></div>
        <div class="cards" id="debtCards"></div>
        <div class="panel">
          <h3 data-i18n="customerDebts"></h3>
          <div class="tbl-wrap"><table id="custDebtTable"></table></div>
        </div>
        <div class="panel">
          <h3 data-i18n="supplierDebts"></h3>
          <div class="tbl-wrap"><table id="supDebtTable"></table></div>
        </div>
      </section>

      <!-- الموظفون -->
      <section class="page" id="page-employees">
        <div class="page-head">
          <h2 class="page-title" data-i18n="employees"></h2>
          <button class="btn btn-gold" onclick="openEmployeeModal()">+ <span data-i18n="addEmployee"></span></button>
        </div>
        <div class="tbl-wrap"><table id="empTable"></table></div>
      </section>

      <!-- المساهمون -->
      <section class="page" id="page-shareholders">
        <div class="page-head">
          <h2 class="page-title" data-i18n="shareholders"></h2>
          <button class="btn btn-gold" onclick="openShareholderModal()">+ <span data-i18n="addShareholder"></span></button>
        </div>
        <div class="cards" id="shCards"></div>
        <div class="panel">
          <h3 data-i18n="distribution"></h3>
          <p class="muted" id="shProfitBase"></p>
          <div class="tbl-wrap"><table id="shTable"></table></div>
        </div>
      </section>

      <!-- المحافظ والحسابات -->
      <section class="page" id="page-wallets">
        <div class="page-head">
          <h2 class="page-title" data-i18n="wallets"></h2>
          <button class="btn btn-gold" onclick="openWalletModal()">+ <span data-i18n="addWallet"></span></button>
        </div>
        <div class="cards" id="walletCards"></div>
        <div class="panel">
          <h3 data-i18n="transactions"></h3>
          <div class="tbl-wrap"><table id="walletTxTable"></table></div>
        </div>
      </section>

      <!-- المصاريف -->
      <section class="page" id="page-expenses">
        <div class="page-head">
          <h2 class="page-title" data-i18n="expenses"></h2>
          <button class="btn btn-gold" onclick="openExpenseModal()">+ <span data-i18n="addExpense"></span></button>
        </div>
        <div class="cards" id="budgetCards"></div>
        <div class="tbl-wrap"><table id="expTable"></table></div>
      </section>

      <!-- التقارير -->
      <section class="page" id="page-reports">
        <div class="page-head">
          <h2 class="page-title" data-i18n="reports"></h2>
          <button class="btn btn-ghost" onclick="exportReportCsv()" data-i18n="exportCsv"></button>
          <button class="btn btn-ghost" onclick="exportReportPdf()" data-i18n="exportPdf"></button>
        </div>
        <div class="cards" id="repCards"></div>
        <div class="panel"><h3 data-i18n="monthlySales"></h3><div class="bars" id="repBars"></div></div>
        <div class="panel"><h3 data-i18n="topProducts"></h3><div class="bars" id="repTop"></div></div>
        <div class="panel"><h3 data-i18n="profitMarginByProduct"></h3><div class="tbl-wrap"><table id="repMargin"></table></div></div>
        <div class="panel"><h3 data-i18n="topCustomers"></h3><div class="tbl-wrap"><table id="repTopCustomers"></table></div></div>
      </section>

      <!-- المساعد الذكي -->
      <section class="page" id="page-assistant">
        <div class="page-head"><h2 class="page-title" data-i18n="assistant"></h2></div>
        <div class="panel chat-box">
          <div class="chat-log" id="chatLog"></div>
          <div class="chat-input">
            <input id="chatInput" data-i18n-ph="askPlaceholder" onkeydown="if(event.key==='Enter')sendChat()">
            <button class="btn btn-gold" onclick="sendChat()" data-i18n="send"></button>
          </div>
        </div>
      </section>

      <!-- بوت تلجرام -->
      <section class="page" id="page-telegram">
        <div class="page-head">
          <h2 class="page-title" data-i18n="tgTitle"></h2>
          <button class="btn btn-gold" onclick="openTelegramBotModal()">+ <span data-i18n="addBot"></span></button>
        </div>
        <p class="muted" data-i18n="tgHelp" style="margin-bottom:16px"></p>
        <div id="tgBotsList"></div>
      </section>

      <!-- الاتصال بالشبكة — متاحة لكل الأدوار (المحاسب/الكاشير يربطان جهازيهما بالخادم من هنا) -->
      <section class="page" id="page-network">
        <div class="page-head"><h2 class="page-title" data-i18n="networkPage"></h2></div>
        <div class="panel" id="lanPanel">
          <h3 data-i18n="lanTitle"></h3>
          <p class="muted" data-i18n="lanIntro" style="margin-bottom:10px"></p>
          <div class="field">
            <label data-i18n="lanRole"></label>
            <select id="lanRoleSelect" onchange="onLanRoleChange()">
              <option value="off" data-i18n="lanRoleOff"></option>
              <option value="host" data-i18n="lanRoleHost"></option>
              <option value="client" data-i18n="lanRoleClient"></option>
            </select>
          </div>
          <div id="lanNameBox" style="display:none;margin-top:10px">
            <label data-i18n="lanDeviceName"></label>
            <input type="text" id="lanDeviceName" data-i18n-ph="lanDeviceNamePh" maxlength="40">
            <p class="muted" data-i18n="lanDeviceNameHint" style="margin:6px 0 0"></p>
          </div>
          <div id="lanHostBox" style="display:none;margin-top:10px;background:rgba(200,164,92,0.08);padding:14px;border-radius:8px;border:1px solid var(--gold)">
            <!-- شريط تحذير: تغيّر عنوان الخادم منذ آخر تشغيل — الأجهزة المتصلة تحفظ العنوان القديم -->
            <div id="lanIpChangedBar" style="display:none;background:rgba(224,85,85,0.12);border:1px solid #e05555;color:#e05555;padding:10px 12px;border-radius:8px;margin:0 0 10px;font-weight:bold">⚠ <span data-i18n="lanIpChanged"></span></div>
            <!-- رسالة فشل تشغيل الخادم (مثل: المنفذ محجوز) — بدل الفشل الصامت في console -->
            <div id="lanHostError" style="display:none;background:rgba(224,85,85,0.12);border:1px solid #e05555;color:#e05555;padding:10px 12px;border-radius:8px;margin:0 0 10px;font-weight:bold"></div>
            <p class="muted" data-i18n="lanHostHint" style="margin:0 0 6px"></p>
            <div id="lanMyAddress" style="font-size:22px;font-weight:bold;color:var(--gold);direction:ltr;text-align:center">—</div>
            <div style="text-align:center;margin-top:6px"><button class="btn btn-ghost" onclick="copyLanAddress()" data-i18n="lanCopyAddress"></button></div>
            <p class="muted" data-i18n="lanPairCodeHostHint" style="margin:10px 0 4px"></p>
            <div id="lanPairCodeShow" style="font-size:26px;font-weight:bold;letter-spacing:6px;color:var(--gold);direction:ltr;text-align:center">—</div>
            <div style="text-align:center;margin-top:6px"><button class="btn btn-ghost" onclick="regenLanToken()" data-i18n="lanRegenCode"></button></div>
            <div class="field" style="margin-top:12px">
              <label data-i18n="lanPortLabel"></label>
              <!-- type=text لا type=number: حقل الأرقام يتبع لغة الصفحة فيعرض أرقاماً هندية بالعربية -->
              <input type="text" id="lanPort" inputmode="numeric" maxlength="5" style="direction:ltr;text-align:center">
              <p class="muted" data-i18n="lanPortHint" style="margin:6px 0 0"></p>
            </div>
            <p class="muted" style="margin:12px 0 6px"><span data-i18n="lanConnectedClients"></span>: <b id="lanClientCount">0</b></p>
            <!-- جدول إدارة الأجهزة المتصلة (اسم — حالة — آخر ظهور — فصل) يُرسم من renderLanClients -->
            <div id="lanClientsTable"></div>
          </div>
          <div id="lanClientBox" style="display:none;margin-top:10px">
            <button class="btn btn-gold" onclick="discoverLanHosts()" style="width:100%" id="lanDiscoverBtn" data-i18n="lanDiscoverBtn"></button>
            <div id="lanDiscoveryList" style="margin-top:8px"></div>
            <p class="muted" data-i18n="lanClientHint" style="margin:10px 0 6px"></p>
            <div style="display:flex;gap:10px">
              <input type="text" id="lanHostIp" placeholder="192.168.1.10" style="flex:1;direction:ltr;text-align:left">
              <button class="btn btn-ghost" onclick="testLanHost()" data-i18n="lanTestBtn"></button>
            </div>
            <div class="field" style="margin-top:10px">
              <label data-i18n="lanPairCodeLabel"></label>
              <input type="text" id="lanToken" data-i18n-ph="lanPairCodePh" style="direction:ltr;text-align:center;letter-spacing:4px" maxlength="20">
              <p class="muted" data-i18n="lanPairCodeHint" style="margin:6px 0 0"></p>
            </div>
            <p id="lanClientStatus" style="margin:8px 0 0"></p>
          </div>
          <div style="height:12px"></div>
          <button class="btn btn-gold" onclick="saveLanConfig()" data-i18n="save"></button>
        </div>
      </section>

      <!-- الإعدادات -->
      <section class="page" id="page-settings">
        <div class="page-head"><h2 class="page-title" data-i18n="settings"></h2></div>
        <div class="panel">
          <div class="grid2">
            <div class="field"><label data-i18n="language"></label>
              <select id="setLang">
                <option value="ar">العربية</option>
                <option value="fr">Français</option>
                <option value="en">English</option>
              </select>
            </div>
            <div class="field"><label data-i18n="currency"></label><input id="setCurrency"></div>
            <div class="field"><label data-i18n="businessName"></label><input id="setBiz"></div>
          </div>
          <button class="btn btn-gold" onclick="saveSettings()" data-i18n="save"></button>
        </div>

        <!-- إعداد الشبكة انتقل لصفحة «الاتصال بالشبكة» المتاحة لكل الأدوار -->
        <div class="panel">
          <h3 data-i18n="lanTitle"></h3>
          <p class="muted" data-i18n="lanMovedHint" style="margin-bottom:10px"></p>
          <button class="btn btn-gold" onclick="goPage('network')" data-i18n="networkPage"></button>
        </div>

        <div class="panel" id="deviceRolePanel">
          <h3 data-i18n="deviceRoleTitle"></h3>
          <p class="muted" data-i18n="deviceRoleIntro" style="margin-bottom:10px"></p>
          <p class="muted" style="margin:0 0 10px">
            <span data-i18n="deviceRoleCurrentLabel"></span>:
            <b id="deviceRoleCurrent" style="color:var(--gold)">—</b>
          </p>
          <div class="field">
            <label data-i18n="deviceRoleAssign"></label>
            <select id="deviceRoleSelect">
              <option value="" data-i18n="deviceRoleNone"></option>
              <option value="manager" data-i18n="roleManager"></option>
              <option value="accountant" data-i18n="roleAccountant"></option>
              <option value="cashier" data-i18n="roleCashier"></option>
            </select>
          </div>
          <div style="display:flex;gap:10px;margin-top:12px">
            <button class="btn btn-gold" onclick="saveDeviceRole()" data-i18n="save"></button>
            <button class="btn btn-ghost" onclick="clearDeviceRole()" data-i18n="deviceRoleClear"></button>
          </div>
        </div>

        <div class="panel">
          <h3 data-i18n="companyInfo"></h3>
          <div class="grid2">
            <div class="field"><label data-i18n="address"></label><input id="setAddress"></div>
            <div class="field"><label data-i18n="phone"></label><input id="setPhone"></div>
            <div class="field" style="grid-column: span 2"><label data-i18n="companyRC"></label><input id="setRC"></div>
          </div>
          <div class="field"><label data-i18n="note"></label><input id="setCompanyNotes"></div>
          <div class="field">
            <label data-i18n="companyLogo"></label>
            <div style="display:flex;align-items:center;gap:12px">
              <img id="logoPreview" style="width:52px;height:52px;border-radius:12px;object-fit:cover;border:1px solid var(--border-subtle);display:none">
              <button type="button" class="btn btn-ghost btn-sm" onclick="$('logoFile').click()" data-i18n="uploadLogo"></button>
              <button type="button" class="btn btn-danger btn-sm" onclick="removeCompanyLogo()" data-i18n="removeLogo"></button>
              <input type="file" id="logoFile" accept="image/*" style="display:none" onchange="onLogoFileChange(event)">
            </div>
          </div>
          <button class="btn btn-gold" onclick="saveSettings()" data-i18n="save"></button>
        </div>
        <div class="panel">
          <h3 data-i18n="invoiceDesign"></h3>
          <div class="grid2">
            <div class="field"><label data-i18n="invoiceTemplate"></label>
              <select id="setInvTemplate" onchange="updateInvoiceDesignPreview()">
                <option value="classic" data-i18n="tplClassic"></option>
                <option value="modern" data-i18n="tplModern"></option>
                <option value="minimal" data-i18n="tplMinimal"></option>
                <option value="bold" data-i18n="tplBold"></option>
              </select>
            </div>
            <div class="field"><label data-i18n="invoiceColor"></label><input id="setInvColor" type="color" style="height:44px;padding:4px" oninput="updateInvoiceDesignPreview()"></div>
          </div>
          <button class="btn btn-gold" onclick="saveInvoiceDesign()" data-i18n="save"></button>
          <div id="invDesignPreview" style="margin-top:16px"></div>
        </div>
        <div class="panel">
          <h3 data-i18n="currencies"></h3>
          <div id="currenciesList"></div>
          <div class="grid3" style="margin-top:10px">
            <input id="newCurCode" data-i18n-ph="currencyCode" style="text-transform:uppercase">
            <input id="newCurRate" type="number" min="0" step="0.0001" data-i18n-ph="exchangeRate">
            <button class="btn btn-gold btn-sm" onclick="addCurrency()">+</button>
          </div>
        </div>
        <div class="panel">
          <h3 data-i18n="budgets"></h3>
          <div class="grid2" id="budgetInputs"></div>
          <button class="btn btn-gold" onclick="saveBudgets()" data-i18n="save"></button>
        </div>
        <div class="panel">
          <h3 data-i18n="aiSettings"></h3>
          <p class="muted" data-i18n="aiKeyHint" style="margin-bottom:10px"></p>
          <div class="field">
            <label data-i18n="aiKeyLabel"></label>
            <input id="setGroqKey" type="password" placeholder="gsk_..." style="direction:ltr;text-align:left" autocomplete="off">
          </div>
          <button class="btn btn-gold" onclick="saveAiKey()" data-i18n="save"></button>
        </div>
        <div class="panel">
          <h3 data-i18n="notifSettings"></h3>
          <label class="switch-row"><input type="checkbox" id="setNotifLowStock"><span data-i18n="lowStockNotif"></span></label>
          <div style="height:10px"></div>
          <label class="switch-row"><input type="checkbox" id="setNotifWeekly"><span data-i18n="weeklyReportNotif"></span></label>
          <div style="height:14px"></div>
          <button class="btn btn-gold" onclick="saveSettings()" data-i18n="save"></button>
        </div>
        <div class="panel">
          <h3 data-i18n="security"></h3>
          <label class="switch-row">
            <input type="checkbox" id="setAuthEnabled">
            <span data-i18n="enableLogin"></span>
          </label>
          <div class="grid2" style="margin-top:12px">
            <div class="field"><label data-i18n="changeUser"></label><input id="setUsername"></div>
            <div class="field"><label data-i18n="newPassword"></label><input id="setNewPass" type="password" placeholder="••••••••"></div>
          </div>
          <button class="btn btn-gold" onclick="saveSecurity()" data-i18n="save"></button>
        </div>

        <div class="panel">
          <h3 data-i18n="dataSection"></h3>
          <p class="muted" data-i18n="autoBackupInfo" style="margin-bottom:12px"></p>
          <div style="display:flex;gap:10px;flex-wrap:wrap">
            <button class="btn btn-ghost" onclick="exportData()" data-i18n="exportData"></button>
            <button class="btn btn-ghost" onclick="importData()" data-i18n="importData"></button>
            <button class="btn btn-ghost" onclick="bridge.openBackupsFolder()" data-i18n="openBackupsFolder"></button>
          </div>
          <input type="file" id="importFile" accept=".json" style="display:none">
        </div>
        <div class="panel">
          <h3 data-i18n="trash"></h3>
          <div class="tbl-wrap"><table id="trashTable"></table></div>
          <button class="btn btn-danger btn-sm" style="margin-top:12px" onclick="emptyTrash()" data-i18n="emptyTrash"></button>
        </div>
        <div class="panel">
          <h3 data-i18n="auditLog"></h3>
          <div class="tbl-wrap"><table id="auditLogTable"></table></div>
        </div>
        <p class="dev-credit dev-credit-link" onclick="bridge.openExternal('https://abdselam1.github.io/rim-medical/developer.html')" data-i18n="developerCredit"></p>
      </section>

      <!-- الإدارة (المطوّر فقط) -->
      <section class="page" id="page-admin">
        <div class="page-head"><h2 class="page-title" data-i18n="management"></h2></div>
        <p class="muted" data-i18n="adminManagementHint" style="margin-bottom:16px"></p>

        <div class="panel">
          <h3 data-i18n="licenseTitle"></h3>
          <div class="field">
            <label data-i18n="deviceId"></label>
            <div style="display:flex;gap:8px">
              <input id="licDeviceId" readonly>
              <button type="button" class="btn btn-ghost btn-sm" onclick="copyDeviceId()" data-i18n="copy"></button>
            </div>
            <p class="muted" data-i18n="licenseHelpCustomer" style="margin-top:6px"></p>
          </div>
        </div>
      </section>
    </main>

    <!-- الزر العائم (فاتورة جديدة) -->
    <button class="btn btn-gold" id="fabNewInvoice" onclick="closeCmdk(); goPage('invoices'); openInvoiceModal()" style="position:fixed;bottom:24px;left:24px;z-index:90;border-radius:50px;box-shadow:0 8px 16px rgba(224,176,96,0.3);padding:12px 24px;font-size:1.1rem;display:flex;align-items:center;gap:8px">
      <span style="font-size:1.4rem;font-weight:bold">+</span>
      <span data-i18n="newInvoice">فاتورة جديدة</span>
    </button>
  </div>

  <!-- نافذة منبثقة عامة -->
  <div class="modal-bg" id="modalBg"><div class="modal" id="modalBox"></div></div>

  <!-- لوحة الأوامر والبحث الشامل (Ctrl+K) -->
  <div class="cmdk-bg" id="cmdkBg">
    <div class="cmdk-box">
      <input id="cmdkInput" class="cmdk-input" data-i18n-ph="cmdkPlaceholder" autocomplete="off">
      <div class="cmdk-results" id="cmdkResults"></div>
      <div class="cmdk-hint" data-i18n="cmdkHint"></div>
    </div>
  </div>

  <!-- الإشعار -->
  <div class="toast" id="toast"></div>

  <!-- منطقة الطباعة -->
  <div id="print-area"></div>

  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
